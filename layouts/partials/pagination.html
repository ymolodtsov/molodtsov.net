{{ $pag := $.Paginator }}

<nav class="pagination" role="navigation">
    {{ if or $pag.HasPrev $pag.HasNext }}
		{{ if $pag.HasPrev }}
			<a class="dates" href="{{ $pag.Prev.URL }}">← Позднее</a>
		{{ end }}
		<!--<span class="page-number">Page {{ $pag.PageNumber }} of {{ $pag.TotalPages }}</span>-->
		{{ if $pag.HasNext }}
			<a class="dates page-link" href="{{ $pag.Next.URL }}">Ранее →</a>
		{{ end }}
	{{ end }}
</nav>
